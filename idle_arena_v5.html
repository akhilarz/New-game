<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Idle Arena: Skill Forge - PoE2 Style</title>
<style>
:root{
  --bg:#050308;--bg2:#0f0a18;--panel:#1a1328;--panel2:#22193a;
  --gold:#e8b339;--ember:#ff6b3d;--frost:#5ec9e0;--venom:#6ed65a;
  --blood:#e0405a;--arc:#b06bff;--text:#f0e9ff;--dim:#8a7eb0;--border:#3a2b55;
  --glow:#b06bff44;
}
* {box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,sans-serif;color:var(--text);}
#app{display:flex;flex-direction:column;height:100vh;}

/* PoE2 dark fantasy header */
#hdr{background:linear-gradient(180deg,#1e1530,#0a0612);border-bottom:4px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:16px;box-shadow:0 6px 20px rgba(0,0,0,0.8);}

/* Arena */
#arena{position:relative;flex:1;min-height:0;overflow:hidden;border:3px solid var(--border);border-radius:12px;margin:8px;background:#030206;}

/* Modern buttons */
#abbtn, .ub, .db{
  background:linear-gradient(180deg,#2a1f44,#1a1328);border:2px solid #554488;color:var(--arc);
  padding:12px 24px;border-radius:9999px;font-weight:600;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 15px var(--glow);
}
#abbtn:hover, .ub:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--glow);}

/* Forge - PoE style */
.doll{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:18px;padding:24px;background:radial-gradient(#1c1430,#0a0612);border:2px solid var(--border);border-radius:16px;}
.dslot{position:relative;background:var(--panel2);border:2px solid var(--border);border-radius:14px;padding:18px;text-align:center;min-height:140px;transition:all .3s;}
.dslot:hover{transform:scale(1.06);box-shadow:0 0 25px var(--gold);border-color:var(--gold);}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:center;transition:all .25s;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(176,107,255,0.3);}

</style>
</head>
<body>
<div id="app">
  <!-- Paste your original game body here -->
</div>
</body>
</html>
